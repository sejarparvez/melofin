[package]
name = "melofin"
version = "0.1.0"
edition = "2024"

[dependencies]
rustypipe = "0.11"
tokio = { version = "1", features = ["full"] }
anyhow = "1"

# Playback
libmpv = "2.0"          # or libmpv2 if preferred

# Optional but recommended
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
