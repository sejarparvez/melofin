[package]
name = "melofin"
version = "0.1.0"
edition = "2024"

[dependencies]
rustypipe = "0.11"
tokio = { version = "1", features = ["full"] }
anyhow = "1"

# Playback — mpv subprocess controlled over its JSON IPC socket
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# System integration
mpris-server = "0.9"

# Optional but recommended
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
